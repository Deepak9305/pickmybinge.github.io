<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | PickMyBinge – Movie & TV Insights</title>
  <meta name="description"
    content="Read the latest movie and TV show analysis, hidden gems, and binge-worthy recommendations from PickMyBinge." />
  <link rel="canonical" href="/blog.html" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="/logo.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/global.css" />
  <style>
    /* Specific overrides for Blog page */
    .hero {
      padding: 60px 0 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 900;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--secondary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: var(--gray);
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Filters */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      padding: 20px 0 40px;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 280px;
    }

    .search-box input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 14px 20px 14px 50px;
      color: var(--light);
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .search-box i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
    }

    .chips {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 10px 22px;
      border-radius: 50px;
      border: 1px solid var(--border);
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.3s;
      background: var(--glass);
    }

    .chip:hover {
      border-color: var(--secondary);
      color: var(--secondary);
      background: rgba(0, 206, 203, 0.05);
    }

    .chip.active {
      background: var(--secondary);
      border-color: var(--secondary);
      color: var(--dark) !important;
    }

    /* Hero */
    .hero {
      padding: 60px 0 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 12px;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-image: linear-gradient(135deg, var(--secondary), var(--accent));
    }

    .hero p {
      color: var(--gray);
      font-size: 1.1rem;
    }

    /* Search + filter */
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      padding: 20px 0 36px;
    }

    .search-box {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-box input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 25px;
      padding: 10px 18px 10px 42px;
      color: var(--light);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--secondary);
    }

    .search-box input::placeholder {
      color: var(--gray);
    }

    .search-box i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray);
      font-size: 0.82rem;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gray);
      cursor: pointer;
      transition: all 0.2s;
      background: none;
    }

    .chip:hover {
      border-color: var(--secondary);
      color: var(--secondary);
    }

    .chip.active {
      background: var(--secondary);
      border-color: var(--secondary);
      color: var(--dark);
    }

    /* Grid */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding-bottom: 80px;
    }

    .blog-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex;
      flex-direction: column;
    }

    .blog-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      border-color: rgba(0, 206, 203, 0.3);
    }

    .card-thumb {
      height: 180px;
      background: linear-gradient(135deg, #1A1A2E, #2D3047);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
    }

    .card-thumb-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 94, 91, 0.1), rgba(0, 206, 203, 0.1));
    }

    .card-cat-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--accent);
      color: var(--dark);
      padding: 4px 12px;
      border-radius: 14px;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-body {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-meta {
      display: flex;
      gap: 12px;
      font-size: 0.77rem;
      color: var(--gray);
      margin-bottom: 14px;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
      transition: color 0.2s;
    }

    .blog-card:hover .card-title {
      color: var(--secondary);
    }

    .card-excerpt {
      color: var(--gray);
      font-size: 0.87rem;
      line-height: 1.65;
      flex: 1;
    }

    .card-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .read-more {
      color: var(--secondary);
      font-weight: 700;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
    }

    .read-more:hover {
      gap: 10px;
    }

    /* Skeleton */
    .skel {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .skel-img {
      height: 180px;
      background: linear-gradient(90deg, var(--glass) 25%, rgba(255, 255, 255, 0.07) 50%, var(--glass) 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
    }

    .skel-body {
      padding: 24px;
    }

    .skel-line {
      height: 11px;
      border-radius: 6px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, var(--glass) 25%, rgba(255, 255, 255, 0.07) 50%, var(--glass) 75%);
      background-size: 200%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      from {
        background-position: 200% 0;
      }

      to {
        background-position: -200% 0;
      }
    }

    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px;
      color: var(--gray);
    }

    .empty i {
      font-size: 2.5rem;
      margin-bottom: 14px;
      color: rgba(139, 139, 160, 0.4);
    }

    .empty h3 {
      font-size: 1.2rem;
      color: var(--light);
      margin-bottom: 8px;
    }

    footer {
      text-align: center;
      padding: 30px 0;
      border-top: 1px solid var(--border);
      color: var(--gray);
      font-size: 0.85rem;
    }

    footer nav {
      margin-top: 12px;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    footer a {
      color: var(--gray);
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--secondary);
    }
  </style>
</head>

<body>

  <header>
    <div class="container">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <a href="/" class="logo-container">
          <img src="/logo.png" alt="PickMyBinge" />
          <span class="brand-name">PickMyBinge</span>
        </a>
        <nav class="main-nav" id="main-nav">
          <button class="menu-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
          <div class="nav-menu" id="nav-menu">
            <button class="close-btn" id="close-btn"><i class="fas fa-times"></i></button>
            <a href="/"><i class="fas fa-home"></i> Home</a>
            <a href="/cringe.html"><i class="fas fa-ghost"></i> Worst Movies</a>
            <a href="/quiz.html"><i class="fas fa-question-circle"></i> Superhero Quiz</a>
            <a href="/blog.html" class="active-nav"><i class="fas fa-newspaper"></i> Blog</a>
          </div>
        </nav>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="hero">
      <h1>PickMyBinge Blog</h1>
      <p>AI-curated movie analysis, hidden gems, and binge-worthy picks — updated daily.</p>
    </div>

    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="Search articles..." />
      </div>
      <div class="chips" id="chips">
        <button class="chip active" data-cat="all">All</button>
        <button class="chip" data-cat="movies">🎬 Movies</button>
        <button class="chip" data-cat="tv">📺 TV Shows</button>
        <button class="chip" data-cat="korean">🇰🇷 K-Drama</button>
        <button class="chip" data-cat="hidden">💎 Hidden Gems</button>
      </div>
    </div>

    <div class="blog-grid" id="blog-grid">
      <!-- Skeletons... -->
    </div>

    <div id="post-viewer" style="display:none; max-width: 900px; margin: 40px auto; padding-bottom: 80px;">
      <button id="back-btn" class="chip" style="margin-bottom: 30px;"><i class="fas fa-arrow-left"></i> Back to all
        articles</button>
      <div id="post-content">
        <div class="skel" style="height: 400px; margin-bottom: 30px;"></div>
        <div class="skel-line" style="width: 100%; height: 20px;"></div>
        <div class="skel-line" style="width: 90%; height: 20px;"></div>
      </div>
    </div>
  </div>

  <footer>
    <div class="wrap">
      <p>© 2026 PickMyBinge. All rights reserved.</p>
      <nav>
        <a href="/privacy.html">Privacy Policy</a>
        <a href="/terms.html">Terms of Service</a>
        <a href="/contact.html">Contact Us</a>
      </nav>
    </div>
  </footer>

  <script>
    // Nav toggle
    document.getElementById('menu-btn').addEventListener('click', () => document.getElementById('main-nav').classList.toggle('show'));
    document.getElementById('close-btn').addEventListener('click', () => document.getElementById('main-nav').classList.remove('show'));
    document.addEventListener('click', e => { if (!document.getElementById('main-nav').contains(e.target)) document.getElementById('main-nav').classList.remove('show'); });

    const catEmoji = { movies: '🎬', tv: '📺', korean: '🇰🇷', hidden: '💎' };
    const catLabel = { movies: 'Movie', tv: 'TV Show', korean: 'K-Drama', hidden: 'Hidden Gem' };

    function detectCat(title, excerpt) {
      const t = (title + ' ' + (excerpt || '')).toLowerCase();
      if (/korean|k-drama|kdrama|hangul|seoul/.test(t)) return 'korean';
      if (/hidden gem|underrated|overlooked|slept on/.test(t)) return 'hidden';
      if (/series|season|episode|show|tv|netflix series|hbo/.test(t)) return 'tv';
      return 'movies';
    }
    function readTime(txt) { return Math.max(2, Math.ceil((txt || '').split(/\s+/).length / 200)) + ' min'; }
    function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

    let allPosts = [], activeFilter = 'all', searchQ = '';

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (postId) {
        showPost(postId);
      } else {
        const grid = document.getElementById('blog-grid');
        try {
          const res = await fetch('/blogs-index.json');
          allPosts = await res.json();
          allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
        } catch (e) { allPosts = []; }
        render();
      }
    }

    async function showPost(id) {
      document.querySelector('.hero').style.display = 'none';
      document.querySelector('.controls').style.display = 'none';
      document.getElementById('blog-grid').style.display = 'none';
      document.getElementById('post-viewer').style.display = 'block';

      try {
        const res = await fetch(`/content/blogs/${id}.json`);
        if (!res.ok) throw new Error('Post not found');
        const post = await res.json();

        document.title = `${post.title} | PickMyBinge Blog`;

        const cat = post.category || detectCat(post.title, post.content);

        document.getElementById('post-content').innerHTML = `
                <div class="card-meta" style="font-size: 1rem; margin-bottom: 20px;">
                    <span><i class="fas fa-calendar-alt"></i> ${fmtDate(post.date)}</span>
                    <span><i class="fas fa-clock"></i> ${readTime(post.content)} read</span>
                    <span class="card-cat-badge" style="position:static;">${catLabel[cat] || 'Article'}</span>
                </div>
                <h1 style="font-size: 3rem; margin-bottom: 30px; line-height: 1.1;">${post.title}</h1>
                <div style="font-size: 1.2rem; line-height: 1.8; color: #d1d1e0;">
                    ${post.content
            .replace(/\n/g, '<br>')
            .replace(/\[Official Poster Placeholder\]/g, '<div class="blog-media-fallback"><i class="fas fa-film"></i> Official Artwork Incoming</div>')
            .replace(/\[Trailer Placeholder\]/g, '<div class="blog-media-fallback"><i class="fas fa-play-circle"></i> Trailer Available on TMDB</div>')
          }
                </div>
            `;
      } catch (e) {
        document.getElementById('post-content').innerHTML = `<h2>Error</h2><p>Article not found.</p>`;
      }
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      window.history.replaceState({}, '', '/blog.html');
      location.reload();
    });

    function render() {
      const grid = document.getElementById('blog-grid');
      const q = searchQ.trim().toLowerCase();
      const filtered = allPosts.filter(p => {
        const cat = p.category || detectCat(p.title, p.excerpt);
        const matchCat = activeFilter === 'all' || cat === activeFilter;
        const matchSearch = !q || (p.title + ' ' + (p.excerpt || '')).toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty"><i class="fas fa-newspaper"></i><h3>${allPosts.length ? 'No matching articles' : 'More articles coming soon!'}</h3><p>${allPosts.length ? 'Try a different filter.' : 'Our AI publishes new content daily.'}</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((p, i) => {
        const cat = p.category || detectCat(p.title, p.excerpt);
        return `
          <a href="${p.link || '#'}" class="blog-card" style="animation:fadeUp 0.4s ${i * 0.06}s both ease">
            <div class="card-thumb">
              <div class="card-thumb-overlay"></div>
              <span style="position:relative;z-index:1">${catEmoji[cat] || '🎬'}</span>
              <span class="card-cat-badge">${catLabel[cat] || 'Article'}</span>
            </div>
            <div class="card-body">
              <div class="card-meta">
                <span><i class="fas fa-calendar-alt"></i> ${fmtDate(p.date)}</span>
                <span><i class="fas fa-clock"></i> ${readTime(p.content)} read</span>
              </div>
              <h3 class="card-title">${p.title}</h3>
              <p class="card-excerpt">${p.excerpt || ''}</p>
              <div class="card-footer"><span class="read-more">Read More <i class="fas fa-arrow-right"></i></span></div>
            </div>
          </a>`;
      }).join('');
    }

    document.getElementById('chips').addEventListener('click', e => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.cat;
      render();
    });

    document.getElementById('search').addEventListener('input', e => { searchQ = e.target.value; render(); });

    const style = document.createElement('style');
    style.textContent = '@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }';
    document.head.appendChild(style);

    init();
  </script>
</body>

</html>
