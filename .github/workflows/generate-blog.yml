name: Generate Blog Draft

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Blog Generation Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "Error: GROQ_API_KEY is not set in repository secrets."
            exit 1
          fi
          if [ -z "$TMDB_API_KEY" ]; then
            echo "Error: TMDB_API_KEY is not set in repository secrets."
            exit 1
          fi
          node scripts/generate-blog.js

      - name: Commit draft
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          node scripts/sync-draft-choices.js
          git add drafts/ .github/workflows/publish-blog.yml
          if git diff --staged --quiet; then
            echo "No new draft generated."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Draft: $(date +'%Y-%m-%d') [auto]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.committed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
