name: Generate Blog Draft

on:
  workflow_dispatch:
    inputs:
      niche:
        description: "Type any topic or question (e.g. why himmel couldnt pull the hero sword, how powerful is Knull, best action anime 2025). Leave blank to auto-select next unused topic."
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Blog Generation Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BLOG_NICHE: ${{ github.event.inputs.niche || vars.BLOG_NICHE || 'Sci-Fi Thrillers' }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "Error: GROQ_API_KEY is not set in repository secrets."
            exit 1
          fi
          if [ -z "$TMDB_API_KEY" ]; then
            echo "Error: TMDB_API_KEY is not set in repository secrets."
            exit 1
          fi
          node scripts/generate-blog.js

      - name: Sync draft choices in publish workflow
        run: |
          python3 - <<'PYEOF'
          import os, re
          drafts = sorted([f for f in os.listdir('drafts') if f.endswith('.json')], reverse=True)
          with open('.github/workflows/publish-blog.yml', 'r') as f:
              content = f.read()
          options_block = '\n'.join(f'          - {d}' for d in drafts) if drafts else '          - (no drafts)'
          new_content = re.sub(
              r'(        options:\n)(?:          - .+\n)*',
              f'\\1{options_block}\n',
              content
          )
          with open('.github/workflows/publish-blog.yml', 'w') as f:
              f.write(new_content)
          print(f"Updated choices: {drafts}")
          PYEOF

      - name: Commit draft
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add drafts/ .github/workflows/publish-blog.yml
          if git diff --staged --quiet; then
            echo "No new draft generated."
          else
            git commit -m "Draft: $(date +'%Y-%m-%d') [${{ github.event.inputs.niche || vars.BLOG_NICHE || 'Sci-Fi Thrillers' }}]"
            git push
          fi
