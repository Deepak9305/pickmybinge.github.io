name: Daily AI Blog Pipeline

on:
  schedule:
    - cron: '30 1 * * *' # 7:00 AM IST
  workflow_dispatch: # Allow manual run for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Blog Generation Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "Error: GROQ_API_KEY is not set. Please add it to your repository secrets."
            exit 1
          fi
          node scripts/generate-blog.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/content/blogs/ manifest.json public/blogs-index.json
          if git diff --staged --quiet; then
            echo "No new blog content generated."
          else
            git commit -m "Autonomous Blog Update: $(date +'%Y-%m-%d')"
            git push
          fi
