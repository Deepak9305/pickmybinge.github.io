name: Publish Blog Draft

on:
  workflow_dispatch:
    inputs:
      draft_filename:
        description: 'Path to draft (e.g. 2026/05/02/is-succession-worth-watching.html) or "latest"'
        required: true
        type: string
        default: 'latest'

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Publish draft to live
        env:
          DRAFT_FILENAME: ${{ inputs.draft_filename || github.event.inputs.draft_filename }}
        run: node scripts/publish-blog.js

      - name: Remove published draft
        run: |
          if [ -n "$ACTUALLY_PUBLISHED" ]; then
            rm -f "drafts/$ACTUALLY_PUBLISHED"
          fi

      - name: Commit published post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/content/blogs/ public/blogs-index.json drafts/
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Publish: ${ACTUALLY_PUBLISHED:-$DRAFT_FILENAME}"
            git push
          fi

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
