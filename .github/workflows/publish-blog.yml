name: Publish Blog Draft

on:
  workflow_dispatch:
    inputs:
      draft_filename:
        description: 'Select a draft to publish'
        required: true
        type: choice
        options:
          - (no drafts available)

permissions:
  contents: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Publish draft to live
        env:
          DRAFT_FILENAME: ${{ github.event.inputs.draft_filename }}
        run: node scripts/publish-blog.js

      - name: Remove draft and sync choices
        run: |
          rm -f "drafts/${{ github.event.inputs.draft_filename }}"
          node scripts/sync-draft-choices.js

      - name: Commit published post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/content/blogs/ public/blogs-index.json drafts/ .github/workflows/publish-blog.yml
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Publish: ${{ github.event.inputs.draft_filename }}"
            git push
          fi

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
