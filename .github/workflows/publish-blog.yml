name: Publish Blog Draft

on:
  workflow_dispatch:
    inputs:
      draft_filename:
        description: 'Select a draft to publish'
        required: true
        type: choice
        options:
          - 2026-04-30-custom-why-did-homelander-kill-firecracker.json

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Publish draft to live
        env:
          DRAFT_FILENAME: ${{ github.event.inputs.draft_filename }}
        run: node scripts/publish-blog.js

      - name: Remove draft and sync choices
        run: |
          rm -f "drafts/${{ github.event.inputs.draft_filename }}"
          python3 - <<'PYEOF'
          import os, re
          drafts = sorted([f for f in os.listdir('drafts') if f.endswith('.json') or f.endswith('.html')], reverse=True)
          with open('.github/workflows/publish-blog.yml', 'r') as f:
              content = f.read()
          options_block = '\n'.join(f'          - {d}' for d in drafts) if drafts else '          - (no drafts)'
          new_content = re.sub(
              r'(        options:\n)(?:          - .+\n)*',
              f'\\1{options_block}\n',
              content
          )
          with open('.github/workflows/publish-blog.yml', 'w') as f:
              f.write(new_content)
          print(f"Remaining drafts: {drafts}")
          PYEOF

      - name: Commit published post
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/content/blogs/ public/blogs-index.json drafts/ .github/workflows/publish-blog.yml
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Publish: ${{ github.event.inputs.draft_filename }}"
            git push
          fi

      - name: Trigger deploy
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
